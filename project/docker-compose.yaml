services:
  backend:
    container_name: django-backend
    image: sergeyvernyk/django-backend-2:{IMAGE_TAG}
    user: django-user
    ports:
      - 8000:8001
    volumes:
      - backend_static:/app/static
    env_file: .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             gunicorn core.asgi:application -k uvicorn.workers.UvicornWorker -w 1 --bind :8001
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:14.6-alpine
    container_name: postgres-database
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB_NAME
      POSTGRES_INITDB_ARGS: "--data-checksums"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - backend

  adminer:
    image: adminer
    container_name: adminer-postgres
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ubuntu/drf_deploy_project/project/static
networks:
  backend:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1452
