name: Build and Push Image

on:
  workflow_call:
    inputs:
      registry:
        description: Registry for persisting the image (e.g. ghcr.io, docker.io).
        required: true
        type: string
      image-name:
        description: The image name being build.
        required: true
        type: string
      context-path:
        description: Path to the context from which will be build the image. Commonly where the Dockerfile is located.
        required: true
        type: string
      dockerfile-path:
        description: Path to the Dockerfile to build image from (default {context-path}/Dockerfile)
        required: false
        type: string
      working-directory:
        description: Initial directory for building and pushing operations.
        required: true
        type: string
      additional-labels:
        description: The image labels, that will be added to the labels composed by 'metadata-action'.
        required: false
        type: string
      tags:
        description: The image tags for the image being build (see docker/metadata-action documentation).
        required: true
        type: string
      git-ref:
        description: Reference to a branch for checkout (with actions/checkout)
        required: true
        type: string
      registry-username:
        description: Username for a container registry account where the image has been stored.
        required: true
        type: string
    secrets:
      registry-token:
        description: Token for a container registry account where the image has been stored.
        required: true
    outputs:
      image-tag:
        description: Image tags which will be assigned to the image being built.
        value: ${{ jobs.build-push-image.outputs.image_tag }}

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata For Docker Image
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 12
        id: meta
        uses: docker/metadata-action@v6
        with:
          context: git
          images: ${{ inputs.registry }}/${{ inputs.registry-username }}/${{ inputs.image-name }}
          labels: ${{ inputs.additional-labels }}
          tags: ${{ inputs.tags }}
          flavor: |
            latest=false

      - name: Login To Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username }}
          password: ${{ secrets.registry-token }}

      - name: Build And Push Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile-path }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=gha
          cache-from: type=gha
